
    <template>
  <lightning-card>
      <lightning-input
          type="number"
          label="Number of Employees"
          value={numberOfEmployees}
          onchange={handleChange}>
      </lightning-input>
      <lightning-button
          label="Reset"
          onclick={reset}>
      </lightning-button>
        <template if:true={accounts.data}>
            <ul>
                <template for:each={accounts.data} for:item="account">
                    <li key={account.Id}>{account.Name}</li>
                </template>
            </ul>
</template>
  </lightning-card>
</template>
